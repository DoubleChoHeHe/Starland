
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phản hồi khách hàng</title>
    <link rel="stylesheet" href="./report.css">

</head>
<body>

    <div class="feedback-box">

        <h1>Phản hồi khách hàng</h1>

        <p>
            Hãy cho chúng tôi biết trải nghiệm của bạn tại Starland ☕
        </p>

        <form>

            <input type="text" placeholder="Nhập họ tên của bạn" required>

            <input type="email" placeholder="Nhập email của bạn" required>

            <select required>
                <option value="">Đánh giá dịch vụ</option>
                <option>⭐ Rất tốt</option>
                <option>⭐ Tốt</option>
                <option>⭐ Bình thường</option>
                <option>⭐ Chưa tốt</option>
            </select>

            <textarea placeholder="Nhập phản hồi của bạn..."></textarea>

            <button type="submit">
                Gửi phản hồi
            </button>

        </form>

    </div>

</body>
</html>
